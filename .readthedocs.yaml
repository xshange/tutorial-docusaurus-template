version: 2

build:
  os: "ubuntu-22.04"
  tools:
    nodejs: "20"
  jobs:
    install:
      - cd docs/ && npm install
    build:
      html:
        - mkdir --parents $READTHEDOCS_OUTPUT/html/
        - |
          # 所有逻辑放在同一个 shell 中
          LANG="${READTHEDOCS_LANGUAGE:-en}"
          VERSION="${READTHEDOCS_VERSION:-latest}"
          
          if [ "$LANG" = "en" ]; then
            BASE_URL="/$VERSION/"
          else
            BASE_URL="/$LANG/$VERSION/"
          fi
          
          echo "🌐 Language: $LANG"
          echo "📌 Version: $VERSION"
          echo "🔗 BASE_URL: $BASE_URL"
          
          export BASE_URL
          cd docs/ && BASE_URL="$BASE_URL" npm run build
        - cp --recursive docs/build/* $READTHEDOCS_OUTPUT/html/
